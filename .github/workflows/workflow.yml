name: workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [user, guest]
        # suite: [user]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test_${{ matrix.suite }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/e2e_test_${{ matrix.suite }}
      SESSION_SECRET: ci-test-session-secret
      NODE_ENV: development
      PORT: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Start server
        run: npm run dev &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port $PORT..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:$PORT/ > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          exit 1

      - name: Run Cypress tests (${{ matrix.suite }})
        run: npm run cy:run:${{ matrix.suite }}          # cy:run:${{ matrix.suite }}:video for debug

      - name: Upload results and screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-results-${{ matrix.suite }}
          path: cypress/results
          if-no-files-found: ignore
