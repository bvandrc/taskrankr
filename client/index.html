<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TaskRankr</title>
    <meta name="description" content="Track tasks with priority, ease, enjoyment, and time ratings. Sort by any attribute at a glance." />
    <link rel="icon" type="image/svg+xml" href="/icon-vector-transparent.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192-transparent.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <meta name="theme-color" content="#09090b" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root">
      <style>
        #app-loader {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: hsl(224 71% 4%);
          z-index: 9999;
        }
        #app-loader .spinner {
          width: 36px;
          height: 36px;
          border: 3px solid hsl(217 19% 27%);
          border-top-color: hsl(263 70% 50%);
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="app-loader" data-testid="app-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
